<!DOCTYPE html>
<html>
<head>
  <title>McCalls Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-10">
  <h1 class="text-3xl mb-6">Monthly Report</h1>

  <input id="month" type="month" class="text-black p-2 mb-4 rounded">

  <button onclick="loadReport()" class="bg-yellow-400 text-black px-4 py-2 rounded ml-2">
    Load Report
  </button>

  <div id="output" class="mt-10"></div>

  <script>
    async function loadReport() {
      const month = document.getElementById("month").value;
      const output = document.getElementById("output");

      output.innerHTML = "<p>Loading...</p>";

      try {
        const res = await fetch("https://mccalls-dashboard.onrender.com/api/report?month=" + month);
        const data = await res.json();

        if (data.error) {
          output.innerHTML = `<div class="text-red-400">${data.error}</div>`;
          return;
        }

        const meta = data.meta_ads || {};

        output.innerHTML = `
          <h2 class="text-xl font-semibold mb-4 text-yellow-400">Meta Ads</h2>

          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <div class="bg-gray-800 p-4 rounded"><h2 class="text-sm text-gray-400">Amount Spent</h2><p class="text-2xl font-bold">${meta.amount_spent ?? 0}</p></div>
            <div class="bg-gray-800 p-4 rounded"><h2 class="text-sm text-gray-400">Impressions</h2><p class="text-2xl font-bold">${meta.impressions ?? 0}</p></div>
            <div class="bg-gray-800 p-4 rounded"><h2 class="text-sm text-gray-400">Reach</h2><p class="text-2xl font-bold">${meta.reach ?? 0}</p></div>
            <div class="bg-gray-800 p-4 rounded"><h2 class="text-sm text-gray-400">Link Clicks</h2><p class="text-2xl font-bold">${meta.link_clicks ?? 0}</p></div>
            <div class="bg-gray-800 p-4 rounded"><h2 class="text-sm text-gray-400">Landing Page Views</h2><p class="text-2xl font-bold">${meta.landing_page_views ?? 0}</p></div>
            <div class="bg-gray-800 p-4 rounded"><h2 class="text-sm text-gray-400">CTR</h2><p class="text-2xl font-bold">${meta.ctr ?? 0}%</p></div>
            <div class="bg-gray-800 p-4 rounded"><h2 class="text-sm text-gray-400">Adds to Cart</h2><p class="text-2xl font-bold">${meta.adds_to_cart ?? 0}</p></div>
            <div class="bg-gray-800 p-4 rounded"><h2 class="text-sm text-gray-400">Checkouts</h2><p class="text-2xl font-bold">${meta.checkouts ?? 0}</p></div>
            <div class="bg-gray-800 p-4 rounded"><h2 class="text-sm text-gray-400">Purchases</h2><p class="text-2xl font-bold">${meta.purchases ?? 0}</p></div>
            <div class="bg-gray-800 p-4 rounded"><h2 class="text-sm text-gray-400">Purchase Conversion Value</h2><p class="text-2xl font-bold">${meta.purchase_conversion_value ?? 0}</p></div>
            <div class="bg-gray-800 p-4 rounded"><h2 class="text-sm text-gray-400">Purchase ROAS</h2><p class="text-2xl font-bold">${meta.purchase_roas ?? 0}</p></div>
            <div class="bg-gray-800 p-4 rounded"><h2 class="text-sm text-gray-400">Cost per Purchase</h2><p class="text-2xl font-bold">${meta.cost_per_purchase ?? 0}</p></div>
          </div>
        `;
      } catch (error) {
        output.innerHTML = `<div class="text-red-400">Error loading report</div>`;
      }
    }
  </script>
</body>
</html>
