<!DOCTYPE html>
<html>
<head>
  <title>McCalls Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-10">
  <h1 class="text-3xl mb-6">Monthly Report</h1>

  <input id="month" type="month" class="text-black p-2 mb-4 rounded">

  <button onclick="loadReport()" class="bg-yellow-400 text-black px-4 py-2 rounded ml-2">
    Load Report
  </button>

  <div id="output" class="mt-10"></div>

  <script>
    function getActionValue(actions, type) {
      if (!actions) return 0;
      const match = actions.find(a => a.action_type === type);
      return match ? match.value : 0;
    }

    async function loadReport() {
      const month = document.getElementById("month").value;
      const output = document.getElementById("output");

      output.innerHTML = "<p>Loading...</p>";

      try {
        const res = await fetch("https://mccalls-dashboard.onrender.com/api/report?month=" + month);
        const data = await res.json();

        if (data.error) {
          output.innerHTML = `<div class="text-red-400">${data.error}</div>`;
          return;
        }

        const meta = data.meta_ads || {};
        const leads = getActionValue(meta.actions, "lead");
        const linkClicks = getActionValue(meta.actions, "link_click");
        const landingPageViews = getActionValue(meta.actions, "landing_page_view");

        output.innerHTML = `
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <div class="bg-gray-800 p-4 rounded">
              <h2 class="text-sm text-gray-400">Month</h2>
              <p class="text-2xl font-bold">${data.requested_month || "-"}</p>
            </div>

            <div class="bg-gray-800 p-4 rounded">
              <h2 class="text-sm text-gray-400">Spend</h2>
              <p class="text-2xl font-bold">${meta.spend || 0}</p>
            </div>

            <div class="bg-gray-800 p-4 rounded">
              <h2 class="text-sm text-gray-400">Impressions</h2>
              <p class="text-2xl font-bold">${meta.impressions || 0}</p>
            </div>

            <div class="bg-gray-800 p-4 rounded">
              <h2 class="text-sm text-gray-400">Clicks</h2>
              <p class="text-2xl font-bold">${meta.clicks || 0}</p>
            </div>

            <div class="bg-gray-800 p-4 rounded">
              <h2 class="text-sm text-gray-400">CTR</h2>
              <p class="text-2xl font-bold">${meta.ctr || 0}%</p>
            </div>

            <div class="bg-gray-800 p-4 rounded">
              <h2 class="text-sm text-gray-400">CPC</h2>
              <p class="text-2xl font-bold">${meta.cpc || 0}</p>
            </div>

            <div class="bg-gray-800 p-4 rounded">
              <h2 class="text-sm text-gray-400">Leads</h2>
              <p class="text-2xl font-bold">${leads}</p>
            </div>

            <div class="bg-gray-800 p-4 rounded">
              <h2 class="text-sm text-gray-400">Link Clicks</h2>
              <p class="text-2xl font-bold">${linkClicks}</p>
            </div>

            <div class="bg-gray-800 p-4 rounded">
              <h2 class="text-sm text-gray-400">Landing Page Views</h2>
              <p class="text-2xl font-bold">${landingPageViews}</p>
            </div>
          </div>
        `;
      } catch (error) {
        output.innerHTML = `<div class="text-red-400">Error loading report</div>`;
      }
    }
  </script>
</body>
</html>
